<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon Homes — Sign Up</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="page-wrapper">
    <section class="hero-section" aria-label="Background imagery">
      <div class="hero-overlay"></div>
      <header class="site-header">
        <nav class="header-nav">
          <div class="header-spacer"></div>
          <h1 class="logo">Horizon Homes</h1>
          <div class="header-actions">
            <button type="button" class="header-icon" aria-label="Search">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            </button>
            <button type="button" class="header-icon" aria-label="Favorites">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            </button>
            <button type="button" class="header-icon" aria-label="Account">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
          </div>
        </nav>
      </header>

      <div class="content-grid">
        <aside class="sidebar">
          <div class="sidebar-image" role="img" aria-label="Featured property or company branding"></div>
        </aside>

        <section class="form-section">
          <div id="success-notification" class="success-notification" role="status" aria-live="polite" hidden>
            Your account has been created and your appointment is confirmed.
          </div>
          <form class="signup-form" id="signup-form" action="#" method="post" novalidate>
            <h2 class="form-title">Create your account</h2>

            <div class="form-group input-group">
              <label for="full-name">Full Name</label>
              <div class="input-wrap">
                <input type="text" id="full-name" name="fullName" class="form-input" placeholder="John Smith" required autocomplete="name">
                <span class="input-check" aria-hidden="true">✓</span>
              </div>
            </div>

            <div class="form-group input-group">
              <label for="email">Email</label>
              <div class="input-wrap">
                <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                <span class="input-check" aria-hidden="true">✓</span>
              </div>
            </div>

            <div class="form-group input-group">
              <label for="phone">Phone</label>
              <div class="input-wrap">
                <input type="tel" id="phone" name="phone" class="form-input" placeholder="+1 (555) 000-0000" required autocomplete="tel">
                <span class="input-check" aria-hidden="true">✓</span>
              </div>
            </div>

            <div class="form-group input-group">
              <label for="preferred-datetime">Preferred Date/Time</label>
              <div class="input-wrap">
                <input type="datetime-local" id="preferred-datetime" name="preferredDateTime" class="form-input" required>
                <span class="input-check" aria-hidden="true">✓</span>
              </div>
            </div>

            <div class="form-group input-group">
              <label for="property-type">Property Type</label>
              <div class="input-wrap">
                <select id="property-type" name="propertyType" class="form-input form-select" required>
                  <option value="" disabled selected>Select property type</option>
                  <option value="house">House</option>
                  <option value="apartment">Apartment</option>
                  <option value="condo">Condo</option>
                  <option value="townhouse">Townhouse</option>
                  <option value="land">Land</option>
                </select>
                <span class="input-check" aria-hidden="true">✓</span>
              </div>
            </div>

            <div class="form-group input-group">
              <label for="password">Password</label>
              <div class="input-wrap">
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required minlength="8" autocomplete="new-password">
                <span class="input-check" aria-hidden="true">✓</span>
              </div>
            </div>

            <div class="form-group input-group">
              <label for="confirm-password">Confirm Password</label>
              <div class="input-wrap">
                <input type="password" id="confirm-password" name="confirmPassword" class="form-input" placeholder="••••••••" required minlength="8" autocomplete="new-password">
                <span class="input-check" aria-hidden="true">✓</span>
              </div>
            </div>

            <button type="submit" class="btn-submit" id="create-account-btn">Create Account</button>
          </form>
        </section>
      </div>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
